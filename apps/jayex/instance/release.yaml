apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vault-instance
  namespace: jayex
  labels:
    reconcile.fluxcd.io/watch: Enabled
spec:
  interval: 15m
  timeout: 5m
  chart:
    spec:
      chart: vault-instance
      version: 1.0.28
      sourceRef:
        kind: HelmRepository
        name: jxgh
      interval: 5m
  releaseName: vault-instance
  targetNamespace: jayex
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  test:
    enable: true
  driftDetection:
    mode: enabled
    ignore:
      - paths: [/spec/replicas]
        target:
          kind: Deployment
  values:
    ingress:
      enabled: true
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-production
        traefik.ingress.kubernetes.io/router.entrypoints: websecure
        kubernetes.io/ingress.class: traefik
      spec:
        ingressClassName: traefik
        tls:
          - secretName: vault-tls-secret
            hosts:
              - vault.sakul-flee.de
        rules:
          - host: vault.sakul-flee.de
            http:
              paths:
                - path: /
                  pathType: ImplementationSpecific
                  backend:
                    service:
                      name: vault
                      port:
                        number: 8200
