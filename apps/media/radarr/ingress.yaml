apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: radarr
  namespace: media
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
    traefik.ingress.kubernetes.io/router.entrypoints: websecure 
spec:
  ingressClassName: traefik
  rules:
    - host: radarr.sakul-flee.de
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: radarr
                port:
                  number: 8989
  tls:
    - hosts:
        - radarr.sakul-flee.de 
      secretName: radarr-sakul-flee-de-tls
