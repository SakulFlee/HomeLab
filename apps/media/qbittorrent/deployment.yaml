apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrent
  namespace: media
  labels:
    app: qbittorrent
spec:
  selector:
    matchLabels:
      app: qbittorrent
  replicas: 1
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: qbittorrent
    spec:
      # Forces Kubernetes to kill faster
      terminationGracePeriodSeconds: 5
      # Ensures DNS lookups go through the VPN.
      # This should prevent DNS leaks.
      # This is only a placeholder and should replaced by gluetun automatically with the correct DNS server.
      dnsPolicy: None
      dnsConfig:
        nameservers:
          - 10.8.0.1  # Placeholder! See above.
      volumes:
        - name: gluetun-shared
          emptyDir:
            medium: Memory
        - name: configmap-volume
          configMap:
            name: s6-vpn-injector
            defaultMode: 0755
        - name: qbittorrent-config
          persistentVolumeClaim:
            claimName: qbittorrent-config
        - name: media
          hostPath:
            path: /mnt/nas/Media
      containers:
        # --- VPN SIDECAR CONTAINER (GLUETUN) ---
        - name: gluetun
          image: qmcgaw/gluetun:latest
          imagePullPolicy: IfNotPresent
          # Required for changing the network settings for the whole pod (i.e. both containers)
          securityContext:
            capabilities:
              add: [NET_ADMIN]
          env:
            - name: VPN_SERVICE_PROVIDER
              value: pia
            # Kill-Switch firewall rules:
            - name: FIREWALL
              value: 'on'
            - name: TZ
              value: Europe/Berlin
            - name: VPN_PORT_FORWARDING
              value: on
            - name: PORT_FORWARD_ONLY
              value: "true"
          # Credentials in secret
          envFrom:
            - secretRef:
                name: secret-qbittorrent
          # Expose qBittorrent ports through the Gluetun firewall
          ports:
            - name: webui
              containerPort: 8080
            - name: torrent-tcp
              containerPort: 6881
              protocol: TCP
            - name: torrent-udp
              containerPort: 6881
              protocol: UDP
          volumeMounts:
            - name: gluetun-shared
              mountPath: /tmp/gluetun
        # --- APPLICATION CONTAINER (QBITTORRENT) ---
        - name: qbittorrent
          image: lscr.io/linuxserver/qbittorrent:latest
          imagePullPolicy: IfNotPresent
          # Traffic should be routed through gluetun, thus no network stack definition here.          # 
          env:
            - name: PUID
              value: '1000'
            - name: PGID
              value: '1000'
            - name: TZ
              value: Europe/Berlin
            - name: TORRENTING_PORT
              value: 
          volumeMounts:
            - name: gluetun-shared
              mountPath: /tmp/gluetun
            - name: configmap-volume
              mountPath: /etc/cont-init.d/00-vpn-port.sh
              subPath: 00-vpn-port.sh
            - name: qbittorrent-config
              mountPath: /config
            - name: media
              mountPath: /mnt/nas/Media
          # Lock "started" status until we actually have a port forwarding port set.
          startupProbe:
            periodSeconds: 10
            failureThreshold: 30 
            exec:
              command:
                - /bin/sh
                - -c
                - |
                  # The container is only considered "started" once the TORRENTING_PORT 
                  # file exists and has actual data written by our init script.
                  [ -s /var/run/s6/container_environment/TORRENTING_PORT ] && exit 0
                  [ -s /run/s6-overlay/container_environment/TORRENTING_PORT ] && exit 0
                  exit 1
          # If Gluetun changes the port later, this probe fails, forcing K8s to 
          # restart ONLY this container.
          livenessProbe:
            initialDelaySeconds: 45
            periodSeconds: 15
            failureThreshold: 4
            exec:
              command:
                - /bin/sh
                - -c
                - |
                  [ ! -s /tmp/gluetun/forwarded_port ] && exit 0
                  LIVE_VPN_PORT=$(cat /tmp/gluetun/forwarded_port | tr -d '\r\n ')

                  # Extract active listening torrent port from kernel memory space
                  ACTUAL_PORT=$(netstat -tln 2>/dev/null | grep LISTEN | awk '{print $4}' | awk -F: '{print $NF}' | grep -v '8080' | head -n 1 | tr -d '\r\n ')

                  # If qB hasn't bound to a socket yet, pass safely to prevent race conditions
                  [ -z "$ACTUAL_PORT" ] && exit 0

                  # If it's temporarily showing the safety default port, give it one cycle to reload
                  [ "$ACTUAL_PORT" = "9999" ] && exit 0

                  if [ "$LIVE_VPN_PORT" = "$ACTUAL_PORT" ]; then
                    exit 0
                  else
                    echo "Port mismatch! Gluetun: $LIVE_VPN_PORT, qB: $ACTUAL_PORT"
                    exit 1
                  fi
