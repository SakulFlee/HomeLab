apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrent
  namespace: media
  labels:
    app: qbittorrent
spec:
  selector:
    matchLabels:
      app: qbittorrent
  replicas: 1
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: qbittorrent
    spec:
      # Forces Kubernetes to kill faster
      terminationGracePeriodSeconds: 5
      # Ensures DNS lookups go through the VPN.
      # This should prevent DNS leaks.
      # This is only a placeholder and should replaced by gluetun automatically with the correct DNS server.
      dnsPolicy: None
      dnsConfig:
        nameservers:
          - 10.8.0.1  # Placeholder! See above.
      volumes:
        - name: gluetun-shared
          emptyDir:
            medium: Memory
        - name: qbittorrent-config
          persistentVolumeClaim:
            claimName: qbittorrent-config
        - name: media
          hostPath:
            path: /mnt/nas/Media
      containers:
        # --- VPN SIDECAR CONTAINER (GLUETUN) ---
        - name: gluetun
          image: qmcgaw/gluetun:latest
          imagePullPolicy: IfNotPresent
          # Required for changing the network settings for the whole pod (i.e. both containers)
          securityContext:
            capabilities:
              add: [NET_ADMIN]
          env:
            - name: VPN_SERVICE_PROVIDER
              value: pia
            # Kill-Switch firewall rules:
            - name: FIREWALL
              value: 'on'
            - name: TZ
              value: Europe/Berlin
            - name: VPN_PORT_FORWARDING
              value: on
            - name: PORT_FORWARD_ONLY
              value: "true"
          # Credentials in secret
          envFrom:
            - secretRef:
                name: secret-qbittorrent
          # Expose qBittorrent ports through the Gluetun firewall
          ports:
            - name: webui
              containerPort: 8080
            - name: torrent-tcp
              containerPort: 6881
              protocol: TCP
            - name: torrent-udp
              containerPort: 6881
              protocol: UDP
          volumeMounts:
            - name: gluetun-shared
              mountPath: /tmp/gluetun
        # --- APPLICATION CONTAINER (QBITTORRENT) ---
        - name: qbittorrent
          image: qbittorrentofficial/qbittorrent-nox:latest
          imagePullPolicy: IfNotPresent
          # Traffic should be routed through gluetun, thus no network stack definition here.          
          # This INCLUDES ports!
          env:
            - name: QBT_LEGAL_NOTICE 
              value: confirm
          volumeMounts:
            - name: gluetun-shared
              mountPath: /tmp/gluetun
            - name: qbittorrent-config
              mountPath: /config
            - name: media
              mountPath: /mnt/nas/Media
          # If Gluetun changes the port later, this probe fails, forcing K8s to 
          # restart ONLY this container.
          livenessProbe:
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 1
            exec:
              command:
                - /bin/sh
                - -c
                - |
                  if [ -f /tmp/gluetun/force_restart ]; then
                    echo "Poison Pill found! Removing flag and triggering container restart."
                    rm -f /tmp/gluetun/force_restart
                    exit 1
                  fi
        - name: port-syncer
          image: alpine:latest
          command:
            - /bin/sh
            - -c
            - |
              CONFIG_FILE="/config/qBittorrent/config/qBittorrent.conf"
              LAST_PORT=""

              echo "Port Syncer Sidecar Active."
              
              while true; do
                if [ -s /tmp/gluetun/forwarded_port ]; then
                  CURRENT_PORT=$(cat /tmp/gluetun/forwarded_port | tr -d '\r\n ')
                  
                  if [ "$CURRENT_PORT" != "0" ] && [ "$CURRENT_PORT" != "$LAST_PORT" ] && [ ! -z "$CURRENT_PORT" ]; then
                    echo "Gluetun port changed from '$LAST_PORT' to '$CURRENT_PORT'. Updating config..."
                    
                    sed -i "s/Session\\\\Port=.*/Session\\\\Port=$CURRENT_PORT/" "$CONFIG_FILE"
                    
                    echo "Config file updated."
                    LAST_PORT="$CURRENT_PORT"
                    
                    # DROP THE POISON PILL BELOW:
                    # If this is the initial boot, we don't want to restart right away.
                    # We only drop the pill if we already had a previous port recorded.
                    if [ ! -z "$LAST_PORT" ]; then
                      echo "Creating restart flag file for qBittorrent container..."
                      touch /tmp/gluetun/force_restart
                    fi
                  fi
                fi
                sleep 30
              done          
          volumeMounts:
            - name: gluetun-shared
              mountPath: /tmp/gluetun
            - name: qbittorrent-config
              mountPath: /config
