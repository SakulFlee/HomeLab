apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrent
  namespace: media
  labels:
    app: qbittorrent
spec:
  selector:
    matchLabels:
      app: qbittorrent
  replicas: 1
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: qbittorrent
    spec:
      # Allows killing other container's processes 
      shareProcessNamespace: true
      # Ensures DNS lookups go through the VPN.
      # This should prevent DNS leaks.
      # This is only a placeholder and should replaced by gluetun automatically with the correct DNS server.
      dnsPolicy: None
      dnsConfig:
        nameservers:
          - 10.8.0.1  # Placeholder! See above.
      volumes:
        - name: gluetun-shared
          emptyDir:
            medium: Memory
        - name: s6-env-shared
          emptyDir:
            medium: Memory
        - name: qbittorrent-config
          persistentVolumeClaim:
            claimName: qbittorrent-config
        - name: media
          hostPath:
            path: /mnt/nas/Media
      containers:
        # --- VPN SIDECAR CONTAINER (GLUETUN) ---
        - name: gluetun
          image: qmcgaw/gluetun:latest
          imagePullPolicy: IfNotPresent
          # Required for changing the network settings for the whole pod (i.e. both containers)
          securityContext:
            capabilities:
              add: [NET_ADMIN]
          env:
            - name: VPN_SERVICE_PROVIDER
              value: pia
            # Kill-Switch firewall rules:
            - name: FIREWALL
              value: 'on'
            - name: TZ
              value: Europe/Berlin
            - name: VPN_PORT_FORWARDING
              value: on
            - name: PORT_FORWARD_ONLY
              value: "true"
          # Credentials in secret
          envFrom:
            - secretRef:
                name: secret-qbittorrent
          # Expose qBittorrent ports through the Gluetun firewall
          ports:
            - name: webui
              containerPort: 8080
            - name: torrent-tcp
              containerPort: 6881
              protocol: TCP
            - name: torrent-udp
              containerPort: 6881
              protocol: UDP
          volumeMounts:
            - name: gluetun-shared
              mountPath: /tmp/gluetun
        # --- APPLICATION CONTAINER (QBITTORRENT) ---
        - name: qbittorrent
          image: lscr.io/linuxserver/qbittorrent:latest
          imagePullPolicy: IfNotPresent
          # Traffic should be routed through gluetun, thus no network stack definition here.          # 
          env:
            - name: PUID
              value: '1000'
            - name: PGID
              value: '1000'
            - name: TZ
              value: Europe/Berlin
            - name: TORRENTING_PORT
              value: 
          volumeMounts:
            - name: gluetun-shared
              mountPath: /tmp/gluetun
            - name: s6-env-shared
              mountPath: /var/run/s6/container-environment
            - name: qbittorrent-config
              mountPath: /config
            - name: media
              mountPath: /mnt/media
        # -----------------------------------------------------------------
        # Port watcher & Restarter
        # -----------------------------------------------------------------
        - name: port-watcher
          image: alpine:latest
          volumeMounts:
            - name: gluetun-shared
              mountPath: /tmp/gluetun
            - name: s6-env-shared
              mountPath: /var/run/s6/container-environment
          command: ["/bin/sh", "-c"]
          args:
            - |
              #!/bin/sh

              CURRENT_PORT=""

              while true; do
                # 1. Wait for Gluetun to write a valid port
                while [ ! -s /tmp/gluetun/forwarded_port ]; do sleep 2; done
                NEW_PORT=$(cat /tmp/gluetun/forwarded_port)

                # 2. If the port is new and valid, update the environment and restart the container
                if [ "$NEW_PORT" != "$CURRENT_PORT" ] && [ "$NEW_PORT" != "0" ]; then
                  echo "New Gluetun port detected: $NEW_PORT"
                  
                  # Write the environment variable into the shared s6 directory
                  echo -n "$NEW_PORT" > /var/run/s6/container-environment/TORRENTING_PORT
                  echo "Wrote ENV variable to shared storage."

                  # If this isn't the first boot, we need to restart the container to apply it
                  if [ ! -z "$CURRENT_PORT" ]; then
                    echo "Port changed from $CURRENT_PORT to $NEW_PORT. Sniper targeting service container..."
                    
                    # Find the s6 supervisor process inside the shared namespace and kill it.
                    # This kills the service container, but leaves Gluetun completely untouched.
                    TARGET_PID=$(ps -ef | grep -E 's6-svscan|s6-supervise' | grep -v grep | awk '{print $2}' | head -n 1)
                    
                    if [ ! -z "$TARGET_PID" ]; then
                      echo "Killing s6-svscan (PID: $TARGET_PID) to force container restart..."
                      kill -15 "$TARGET_PID"
                    fi
                  else
                    echo "First boot baseline established. If your app crashed initially, Kubernetes is restarting it now."
                  fi

                  CURRENT_PORT=$NEW_PORT
                fi

                sleep 15
              done
