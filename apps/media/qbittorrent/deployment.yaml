apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrent
  namespace: media
  labels:
    app: qbittorrent
spec:
  selector:
    matchLabels:
      app: qbittorrent
  replicas: 1
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: qbittorrent
    spec:
      # Ensures DNS lookups go through the VPN.
      # This should prevent DNS leaks.
      # This is only a placeholder and should replaced by gluetun automatically with the correct DNS server.
      dnsPolicy: None
      dnsConfig:
        nameservers:
          - 10.8.0.1  # Placeholder! See above.
      volumes:
        - name: gluetun-shared
          emptyDir: {}
        - name: qbittorrent-config
          persistentVolumeClaim:
            claimName: qbittorrent-config
        - name: media
          hostPath:
            path: /mnt/nas/Media
      containers:
        # --- VPN SIDECAR CONTAINER (GLUETUN) ---
        - name: gluetun
          image: qmcgaw/gluetun:latest
          imagePullPolicy: IfNotPresent
          # Required for changing the network settings for the whole pod (i.e. both containers)
          securityContext:
            capabilities:
              add: [NET_ADMIN]
          env:
            - name: VPN_SERVICE_PROVIDER
              value: pia
            # Kill-Switch firewall rules:
            - name: FIREWALL
              value: 'on'
            - name: TZ
              value: Europe/Berlin
            - name: VPN_PORT_FORWARDING
              value: on
            - name: PORT_FORWARD_ONLY
              value: "true"
          # Credentials in secret
          envFrom:
            - secretRef:
                name: secret-qbittorrent
          # Expose qBittorrent ports through the Gluetun firewall
          ports:
            - name: webui
              containerPort: 8080
            - name: torrent-tcp
              containerPort: 6881
              protocol: TCP
            - name: torrent-udp
              containerPort: 6881
              protocol: UDP
          volumeMounts:
            - name: gluetun-shared
              mountPath: /tmp/gluetun
        # --- APPLICATION CONTAINER (QBITTORRENT) ---
        - name: qbittorrent
          image: lscr.io/linuxserver/qbittorrent:latest
          imagePullPolicy: IfNotPresent
          # Traffic should be routed through gluetun, thus no network stack definition here.          # 
          env:
            - name: PUID
              value: '1000'
            - name: PGID
              value: '1000'
            - name: TZ
              value: Europe/Berlin
          volumeMounts:
            - name: gluetun-shared
              mountPath: /tmp/gluetun
            - name: qbittorrent-config
              mountPath: /config
            - name: media
              mountPath: /mnt/media
          command: ["/bin/sh", "-c"]
          args:
            - |
              #!/bin/sh
              # Trap termination signals from Kubernetes so we can cleanly stop our app
              _term() { 
                echo "Caught SIGTERM/SIGINT signal! Shutting down gracefully..."
                kill -TERM "$APP_PID" 2>/dev/null
                exit 0
              }
              trap _term SIGTERM SIGINT

              # Prevent endless-loop configuration
              LAST_RESTART_TIME=0
              MIN_RESTART_INTERVAL=300 # Wait at least 5 minutes (300s) between forced restarts

              while true; do
                echo "========================================="
                echo "Waiting for Gluetun to write the forwarded port..."
                echo "========================================="
                
                # Loop until the file exists and is greater than 0 bytes
                while [ ! -s /tmp/gluetun/forwarded_port ]; do 
                  sleep 1 
                done
                
                # Settle buffer: gives Gluetun a brief window to finalize routing
                sleep 2 
                
                CURRENT_PORT=$(cat /tmp/gluetun/forwarded_port)
                echo "Found active Gluetun port: $CURRENT_PORT"
                
                # --- START YOUR APPLICATION ---
                # 1. Inject the port into specific environment variable
                export TORRENTING_PORT=$CURRENT_PORT
                
                # 2. Run your container's original startup command in the background (&)
                echo "Launching application process..."
                /init & 
                APP_PID=$! # Capture the background process ID

                # --- MONITOR LOOP ---
                while true; do
                  sleep 15
                  NEW_PORT=$(cat /tmp/gluetun/forwarded_port)
                  CURRENT_TIME=$(date +%s)
                  
                  # Verify if a legitimate port change occurred
                  if [ "$NEW_PORT" != "$CURRENT_PORT" ] && [ ! -z "$NEW_PORT" ] && [ "$NEW_PORT" != "0" ]; then
                    
                    # Calculate how long we've been running on this port
                    TIME_SINCE_LAST_RESTART=$((CURRENT_TIME - LAST_RESTART_TIME))
                    
                    if [ "$TIME_SINCE_LAST_RESTART" -lt "$MIN_RESTART_INTERVAL" ]; then
                      echo "WARNING: Port changed to $NEW_PORT, but we restarted too recently ($TIME_SINCE_LAST_RESTART seconds ago)."
                      echo "Throttling restart to prevent an endless loop. Holding current process..."
                      sleep 60
                      continue
                    fi

                    echo "CRITICAL: Gluetun port changed from $CURRENT_PORT to $NEW_PORT!"
                    echo "Stopping application to apply new configuration..."
                    
                    LAST_RESTART_TIME=$CURRENT_TIME
                    kill -TERM "$APP_PID"
                    wait "$APP_PID"
                    break # Breaks the inner loop, causing the outer loop to re-read the file
                  fi
                  
                  # Self-healing check: If your app crashes on its own, restart it
                  if ! kill -0 "$APP_PID" 2>/dev/null; then
                    echo "Application process exited unexpectedly. Restarting wrapper loop..."
                    break
                  fi
                done
              done
