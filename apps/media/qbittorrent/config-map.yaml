apiVersion: v1
kind: ConfigMap
metadata:
  name: s6-vpn-injector
  namespace: media
data:
  00-vpn-port.sh: |
    #!/bin/sh
    echo "========================================="
    echo "s6-init: Syncing Gluetun Port to qBittorrent Config..."
    echo "========================================="
    
    START_TIME=$(date +%s)
    
    # 1. Wait for the fresh Gluetun port file
    while true; do
      if [ -s /tmp/gluetun/forwarded_port ]; then
        FILE_TIME=$(stat -c %Y /tmp/gluetun/forwarded_port 2>/dev/null || echo 0)
        if [ "$FILE_TIME" -ge "$START_TIME" ]; then
          RAW_PORT=$(cat /tmp/gluetun/forwarded_port | tr -d '\r\n ')
          if [ "$RAW_PORT" != "0" ] && [ ! -z "$RAW_PORT" ]; then
            break
          fi
        fi
      fi
      sleep 1
    done

    echo "s6-init: Fresh port found: $RAW_PORT"

    # 2. Update the s6 environment variables
    mkdir -p /var/run/s6/container_environment/
    mkdir -p /run/s6-overlay/container_environment/
    echo -n "$RAW_PORT" > /var/run/s6/container_environment/TORRENTING_PORT
    echo -n "$RAW_PORT" > /run/s6-overlay/container_environment/TORRENTING_PORT
    chmod 644 /var/run/s6/container_environment/TORRENTING_PORT
    chmod 644 /run/s6-overlay/container_environment/TORRENTING_PORT

    # 3. Patch the main config file
    CONFIG_FILE="/config/qBittorrent/qBittorrent.conf"
    if [ -f "$CONFIG_FILE" ]; then
      if grep -q "Session\\\\Port=" "$CONFIG_FILE"; then
        sed -i "s/Session\\\\Port=.*/Session\\\\Port=$RAW_PORT/" "$CONFIG_FILE"
      else
        if grep -q "\[BitTorrent\]" "$CONFIG_FILE"; then
          sed -i "/\[BitTorrent\]/a Session\\\\Port=$RAW_PORT" "$CONFIG_FILE"
        else
          echo -e "\n[BitTorrent]\nSession\\\\Port=$RAW_PORT" >> "$CONFIG_FILE"
        fi
      fi
      echo "s6-init: Config file successfully patched to $RAW_PORT."
    fi

    # 4. --- THE S6 RESPRAWN TRIGGER ---
    # If qBittorrent raced ahead and is already running, kill it.
    # The s6 supervisor will instantly bring it back up using our new config.
    if pkill -f qbittorrent-nox; then
      echo "s6-init: qBittorrent process detected online. Sent termination signal to force an s6 configuration reload!"
    else
      echo "s6-init: qBittorrent has not started yet. It will boot natively with the correct configuration."
    fi

    exit 0
