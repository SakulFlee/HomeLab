apiVersion: v1
kind: ConfigMap
metadata:
  name: s6-vpn-injector
  namespace: media
data:
  00-vpn-port.sh: |
    #!/bin/sh
    echo "========================================="
    echo "s6-init: Syncing Gluetun Port to qBittorrent Config..."
    echo "========================================="
    
    # 1. Wait until Gluetun has written a valid port file
    while [ ! -s /tmp/gluetun/forwarded_port ]; do
      sleep 1
    done

    RAW_PORT=$(cat /tmp/gluetun/forwarded_port | tr -d '\r\n ')
    
    # If Gluetun is still initializing and wrote a placeholder '0', wait for the real port
    while [ "$RAW_PORT" = "0" ] || [ -z "$RAW_PORT" ]; do
      sleep 1
      RAW_PORT=$(cat /tmp/gluetun/forwarded_port | tr -d '\r\n ')
    done

    echo "s6-init: Active Gluetun port detected: $RAW_PORT"

    # 2. Update the s6 environment variables just to be thorough
    mkdir -p /var/run/s6/container_environment/
    mkdir -p /run/s6-overlay/container_environment/
    echo -n "$RAW_PORT" > /var/run/s6/container_environment/TORRENTING_PORT
    echo -n "$RAW_PORT" > /run/s6-overlay/container_environment/TORRENTING_PORT

    # 3. Patch the main config file before qBittorrent even launches
    CONFIG_FILE="/config/qBittorrent/qBittorrent.conf"
    if [ -f "$CONFIG_FILE" ]; then
      if grep -q "Session\\\\Port=" "$CONFIG_FILE"; then
        sed -i "s/Session\\\\Port=.*/Session\\\\Port=$RAW_PORT/" "$CONFIG_FILE"
      else
        if grep -q "\[BitTorrent\]" "$CONFIG_FILE"; then
          sed -i "/\[BitTorrent\]/a Session\\\\Port=$RAW_PORT" "$CONFIG_FILE"
        else
          echo -e "\n[BitTorrent]\nSession\\\\Port=$RAW_PORT" >> "$CONFIG_FILE"
        fi
      fi
      echo "s6-init: Config file successfully patched to $RAW_PORT."
    else
      echo "s6-init: First boot detected, config will be generated automatically."
    fi

    echo "s6-init: Initialization complete!"
    exit 0
