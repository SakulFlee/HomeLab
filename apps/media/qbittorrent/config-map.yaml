apiVersion: v1
kind: ConfigMap
metadata:
  name: s6-vpn-injector
  namespace: media
data:
  00-vpn-port.sh: |
    #!/bin/sh
    echo "========================================="
    echo "s6-init: Waiting for Gluetun port file..."
    echo "========================================="
    
    # Wait for Gluetun to write the port to the shared volume
    while [ ! -s /tmp/gluetun/forwarded_port ]; do
      sleep 1
    done

    # Grab the port
    VPN_PORT=$(cat /tmp/gluetun/forwarded_port)
    echo "s6-init: Found port $VPN_PORT. Injecting environment variable..."

    # s6-overlay natively reads this directory to populate environment variables
    mkdir -p /var/run/s6/container-environment
    echo -n "$VPN_PORT" > /var/run/s6/container-environment/TORRENTING_PORT
    
    exit 0
