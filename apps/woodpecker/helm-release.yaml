apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: woodpecker
  namespace: flux-system
  labels:
    reconcile.fluxcd.io/watch: Enabled
spec:
  interval: 15m
  timeout: 5m
  chartRef:
    kind: OCIRepository
    name: woodpecker
  releaseName: woodpecker
  targetNamespace: woodpecker
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  test:
    enable: true
  driftDetection:
    mode: enabled
    ignore:
      - paths: [/spec/replicas]
        target:
          kind: Deployment
  values:
    server:
      enabled: true
      env:
        WOODPECKER_OPEN: "true"        
        WOODPECKER_ADMIN: sakulflee
        WOODPECKER_HOST: https://woodpecker.sakul-flee.de
        WOODPECKER_FORGEJO: "true"
        WOODPECKER_FORGEJO_URL: https://forgejo.sakul-flee.de
        WOODPECKER_FORGEJO_CLIENT: 2c0dca33-08fe-4fa6-8c6f-33ce3e6833ed
        WOODPECKER_FORGEJO_SECRET: gto_san7q4odi77kyiceviiid4asf7zsb6boyf6ddqf27p6ufpqefhhq
      ingress:
        enabled: true
        className: traefik
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-production
          traefik.ingress.kubernetes.io/router.entrypoints: websecure
        hosts:
          - host: woodpecker.sakul-flee.de
            paths:
              - path: /
                pathType: Prefix
                port: http
        tls:
          - secretName: woodpecker-sakul-flee-de-tls
            hosts: [woodpecker.sakul-flee.de]
    agent:
      enabled: true
      env:
        WOODPECKER_SERVER: "woodpecker-server:9000"
        WOODPECKER_CONNECT_RETRY_COUNT: "10"

