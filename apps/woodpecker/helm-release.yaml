apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: woodpecker
  namespace: flux-system
  labels:
    reconcile.fluxcd.io/watch: Enabled
spec:
  interval: 15m
  timeout: 5m
  chartRef:
    kind: OCIRepository
    name: woodpecker
  releaseName: woodpecker
  targetNamespace: woodpecker
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  test:
    enable: true
  driftDetection:
    mode: enabled
    ignore:
      - paths: [/spec/replicas]
        target:
          kind: Deployment  
  valuesFrom:
    - kind: Secret
      name: woodpecker-forgejo-auth
      valuesKey: client
      targetPath: server.env.WOODPECKER_FORGEJO_CLIENT
    - kind: Secret
      name: woodpecker-forgejo-auth
      valuesKey: secret
      targetPath: server.env.WOODPECKER_FORGEJO_SECRET
  values:
    server:
      enabled: true
      env:
        WOODPECKER_OPEN: "true"        
        WOODPECKER_ADMIN: sakulflee
        WOODPECKER_HOST: https://woodpecker.sakul-flee.de
        WOODPECKER_FORGEJO: "true"
        WOODPECKER_FORGEJO_URL: https://forgejo.sakul-flee.de
      ingress:
        enabled: true
        className: traefik
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-production
          traefik.ingress.kubernetes.io/router.entrypoints: websecure
        hosts:
          - host: woodpecker.sakul-flee.de
            paths:
              - path: /
                pathType: Prefix
                port: http
        tls:
          - secretName: woodpecker-sakul-flee-de-tls
            hosts: [woodpecker.sakul-flee.de]
    agent:
      enabled: true
      replicaCount: 3
      env:
        WOODPECKER_SERVER: "woodpecker-server:9000"
        WOODPECKER_CONNECT_RETRY_COUNT: "10"

