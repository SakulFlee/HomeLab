apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vikunja
  namespace: flux-system
  labels:
    reconcile.fluxcd.io/watch: Enabled
spec:
  interval: 15m
  timeout: 5m
  chartRef:
    kind: OCIRepository
    name: vikunja
  releaseName: vikunja
  targetNamespace: vikunja
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  test:
    enable: true
  driftDetection:
    mode: enabled  
  valuesFrom:
    - kind: Secret
      name: postgres-app
      valuesKey: host
      targetPath: env.VIKUNJA_DATABASE_HOST
    - kind: Secret
      name: postgres-app
      valuesKey: dbname
      targetPath: env.VIKUNJA_DATABASE_DATABASE
    - kind: Secret
      name: postgres-app
      valuesKey: user
      targetPath: env.VIKUNJA_DATABASE_USER
    - kind: Secret
      name: postgres-app
      valuesKey: password
      targetPath: env.VIKUNJA_DATABASE_PASSWORD
  values:
    vikunja:
      configMaps:
        config:
          enabled: true
          data:
            config.yml: |
              cors:
                enable: "true"
              service:
                publicurl: "https://vikunja.sakul-flee.de"
                timezone: "Europe/Berlin"
                enableregistration: "false"
                enablelinksharing: "true"
                defaultlanguage: "en"
      persistence:
        data:
          enabled: true
          storageClass: local-path
          size: 1Gi
        database:
          enabled: false
      env:
        VIKUNJA_DATABASE_TYPE: "postgres"
      ingress:
        main:
          enabled: true
          className: traefik
          annotations:
            cert-manager.io/cluster-issuer: letsencrypt-production
            traefik.ingress.kubernetes.io/router.entrypoints: websecure
          hosts:
            - host: vikunja.sakul-flee.de
              paths:
                - path: /
                  pathType: Prefix
                  port: http
          tls:
            - secretName: vikunja-sakul-flee-de-tls
              hosts: [vikunja.sakul-flee.de]
