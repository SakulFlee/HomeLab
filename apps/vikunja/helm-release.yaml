apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vikunja
  namespace: flux-system
  labels:
    reconcile.fluxcd.io/watch: Enabled
spec:
  interval: 15m
  timeout: 5m
  chartRef:
    kind: OCIRepository
    name: vikunja
  releaseName: vikunja
  targetNamespace: vikunja
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  test:
    enable: true
  driftDetection:
    mode: enabled  
  valuesFrom:
    - kind: Secret
      name: postgres-app
      valuesKey: host
      targetPath: database.host
    - kind: Secret
      name: postgres-app
      valuesKey: dbname
      targetPath: database.database
    - kind: Secret
      name: postgres-app
      valuesKey: user
      targetPath: database.user
    - kind: Secret
      name: postgres-app
      valuesKey: password
      targetPath: database.password
    - kind: Secret
      name: vikunja-mailer
      valuesKey: password
      targetPath: mailer.password
  values:
    configMaps:
      config:
        enabled: true
        data:
          config.yml:
            service:
              enableregistration: false
              enablelinksharing: true
    persistence:
      data:
        enabled: true
        storageClass: local-path
        size: 1Gi
    database:
      type: postgres
      # Rest injected above
    mailer:
      enabled: true
      host: smtp.purelymail.com
      port: 465
      username: dev@sakul-flee.de
      # Password injected above
      fromemail: vikunja@sakul-flee.de 
    ingress:
      main:
        enabled: true
        className: traefik
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-production
          traefik.ingress.kubernetes.io/router.entrypoints: websecure
        hosts:
          - host: vikunja.sakul-flee.de
            paths:
              - path: /
                pathType: Prefix
                port: http
        tls:
          - secretName: vikunja-sakul-flee-de-tls
            hosts: [vikunja.sakul-flee.de]
