apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: csi-driver-nfs
  namespace: flux-system
  labels:
    reconcile.fluxcd.io/watch: Enabled
spec:
  interval: 15m
  timeout: 5m
  chart:
    spec:
      chart: csi-driver-nfs
      version: 4.*
      sourceRef:
        kind: HelmRepository
        name: csi-driver-nfs
      interval: 5m
  releaseName: csi-driver-nfs
  targetNamespace: csi-driver-nfs
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  test:
    enable: true
  driftDetection:
    mode: enabled
  values:
    storageClasses:
    - name: nfs-delete
      # annotations:
        # storageclass.kubernetes.io/is-default-class: "true"
      parameters:
        server: 192.168.178.250
        share: /volume1/Kubernetes
      reclaimPolicy: Delete
      volumeBindingMode: Immediate
      mountOptions:
        - nfsvers=3.0
    - name: nfs-retain
      parameters:
        server: 192.168.178.250
        share: /volume1/Kubernetes
      reclaimPolicy: Retain
      volumeBindingMode: Immediate
      mountOptions:
        - nfsvers=3.0
